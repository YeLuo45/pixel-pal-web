<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0A0514" />
    <meta name="description" content="Your personal AI companion with memory, personality, and proactive assistance" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PixelPal" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-TileColor" content="#0A0514" />
    <meta name="msapplication-tap-highlight" content="no" />
    <title>PixelPal — AI Companion</title>
    <style>
      html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
      /* Touch optimization: prevent double-tap zoom */
      * { touch-action: manipulation; }
      /* Smooth scrolling */
      html { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
      /* Prevent text selection on interactive elements */
      button, [role="button"] { user-select: none; -webkit-user-select: none; }
      /* Touch highlight color */
      ::selection { background: rgba(155, 127, 212, 0.3); }
      /* Ensure minimum touch target size (44px) */
      .touch-target { min-height: 44px; min-width: 44px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker with correct base path
      (function() {
        var base = '/pixel-pal-web/';
        var swPath = base + 'sw.js';
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function() {
            navigator.serviceWorker.register(swPath).catch(function() {
              // SW registration failed silently - app still works without offline support
            });
          });
        }
      })();
    </script>
  </body>
</html>
