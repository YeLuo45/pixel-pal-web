<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#007AFF" />
    <meta name="description" content="Your personal AI companion with memory, personality, and proactive assistance" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PixelPal" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-TileColor" content="#0A0514" />
    <meta name="msapplication-tap-highlight" content="no" />
    <title>PixelPal — AI Companion</title>
    <style>
      html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const isLocalDev = ['127.0.0.1', 'localhost'].includes(window.location.hostname);
          if (isLocalDev) {
            navigator.serviceWorker.getRegistrations()
              .then((registrations) => registrations.forEach((registration) => registration.unregister()))
              .catch(() => {});
            if ('caches' in window) {
              caches.keys()
                .then((keys) => keys.filter((key) => key.startsWith('pixelpal-')).forEach((key) => caches.delete(key)))
                .catch(() => {});
            }
            return;
          }
          navigator.serviceWorker.register('/pixel-pal-web/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
