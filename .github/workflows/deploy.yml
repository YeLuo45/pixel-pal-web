name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Debug environment
        run: |
          echo "NODE_VERSION=$(node -v)"
          echo "NPM_VERSION=$(npm -v)"
          echo "VITE_VERSION=$(npx vite --version)"
          echo "--- npm ls ---"
          npm ls --depth=0 2>&1 | head -50

      - name: Build
        env:
          GITHUB_PAGES: 'true'
        run: |
          echo "=== vite build start ==="
          npx vite build 2>&1
          EXIT=$?
          echo "=== vite build EXIT=$EXIT ==="
          ls -la dist/renderer/ 2>/dev/null || echo "dist/renderer NOT FOUND"
          echo "=== EXIT=$EXIT ===" 

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/renderer

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
