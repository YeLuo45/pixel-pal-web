name: Build Electron (Windows)

on:
  push:
    branches: [v15-desktop-electron]
  pull_request:
    branches: [v15-desktop-electron]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer and electron
        run: npm run build

      - name: Build Windows exe
        run: npm run package

      - name: Upload Windows exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixel-pal-windows-exe
          path: |
            release/**/*.exe
            release/**/*.nupkg
          if-no-files-found: error

  verify:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: pixel-pal-windows-exe
          path: ./dist

      - name: List downloaded files
        run: ls -la ./dist

      - name: Verify exe exists
        run: |
          if ls ./dist/*.exe 2>/dev/null || ls ./dist/**/*.exe 2>/dev/null; then
            echo "SUCCESS: Windows exe found"
            exit 0
          else
            echo "ERROR: No exe found in artifacts"
            exit 1
          fi
